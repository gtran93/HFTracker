a(15,23,42,.86);border:1px solid var(--line2);color:var(--muted)}.danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:#fecaca}.goldbtn{background:linear-gradient(135deg,rgba(214,177,90,.95),rgba(243,217,139,.78));color:#111827;box-shadow:0 12px 28px rgba(214,177,90,.18)}

.roadmap-step{display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}.roadmap-step:last-child{border-bottom:0}.step-dot{width:34px;height:34px;border-radius:14px;display:grid;place-items:center;background:rgba(15,23,42,.84);border:1px solid var(--line2);font-weight:950;color:var(--soft)}.roadmap-step.done .step-dot{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.32);color:var(--green)}.roadmap-step.current .step-dot{background:rgba(214,177,90,.16);border-color:rgba(214,177,90,.42);color:var(--gold2);box-shadow:0 0 22px rgba(214,177,90,.16)}.goal{padding:13px;border:1px solid var(--line);border-radius:18px;background:rgba(15,23,42,.62);margin-bottom:9px}.goal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}.goal h3{font-size:14px}.goal small{color:var(--soft);font-size:10px}.empty{text-align:center;color:var(--soft);padding:34px 12px}.empty div{font-size:34px;margin-bottom:8px;opacity:.62}
.modal-wrap{position:fixed;inset:0;z-index:60;display:none;align-items:flex-end;background:rgba(0,0,0,.62);backdrop-filter:blur(10px)}.modal-wrap.show{display:flex}.modal{width:100%;max-width:980px;margin:0 auto;border-radius:26px 26px 0 0;background:linear-gradient(180deg,#111827,#080d19);border:1px solid var(--line);box-shadow:0 -22px 80px rgba(0,0,0,.54);padding:18px 14px calc(18px + var(--sab));animation:modalUp .24s ease}.handle{width:44px;height:5px;border-radius:99px;background:var(--dim);margin:0 auto 16px}@keyframes modalUp{from{transform:translateY(28px);opacity:.7}to{transform:translateY(0);opacity:1}}
.toast-wrap{position:fixed;left:50%;top:calc(68px + var(--sat));transform:translateX(-50%);z-index:100;width:min(390px,calc(100% - 28px));display:grid;gap:8px;pointer-events:none}.toast{border:1px solid var(--line2);background:rgba(15,23,42,.96);box-shadow:var(--shadow2);border-radius:17px;padding:12px 13px;font-weight:850;display:flex;align-items:center;gap:8px;animation:toastIn .22s ease}.toast.ok{color:var(--green);border-color:rgba(34,197,94,.32)}.toast.err{color:var(--red);border-color:rgba(239,68,68,.32)}.toast.info{color:var(--blue);border-color:rgba(96,165,250,.32)}@keyframes toastIn{from{opacity:0;transform:translateY(-9px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.mt{margin-top:10px}.mb{margin-bottom:10px}.mono{font-family:var(--mono)}.muted{color:var(--muted)}.soft{color:var(--soft)}.nowrap{white-space:nowrap}.hide{display:none!important}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.full{width:100%}

@media (max-width:370px){.g3,.three{grid-template-columns:1fr 1fr}.balance{font-size:31px}.nav .lbl{font-size:8px}.nav .ico{font-size:17px}.preview{grid-template-columns:1fr}.stake-row{grid-template-columns:1fr}}

<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">T</div>
      <div><h1 id="brandName">TradeCommand 360</h1><p id="brandSub">Binary options journal</p></div>
    </div>
    <div class="top-actions">
      <button class="pill" data-action="currency" data-currency="USD">USD</button>
      <button class="pill" data-action="currency" data-currency="AUD">AUD</button>
    </div>
  </header>
  <main class="page" id="page"></main>
  <nav class="nav" id="nav">
    <button data-page="live"><span class="ico">⚡</span><span class="lbl">Live</span></button>
    <button data-page="demo"><span class="ico">🧪</span><span class="lbl">Demo</span></button>
    <button data-page="dashboard"><span class="ico">📊</span><span class="lbl">Dash</span></button>
    <button data-page="roadmap"><span class="ico">🏁</span><span class="lbl">Road</span></button>
    <button data-page="settings"><span class="ico">⚙️</span><span class="lbl">Set</span></button>
  </nav>
</div>
<div class="modal-wrap" id="modalWrap" data-action="modal-backdrop"><div class="modal" id="modal"></div></div>
<div class="toast-wrap" id="toastWrap"></div>
<script>
(function(){
'use strict';
const APP_KEY='tc360_v2';
const LEGACY_KEYS={trades:'trades',settings:'settings',goals:'wishlist'};
const DEFAULTS={
  app:{name:'TradeCommand 360',subtitle:'Binary options journal',currency:'USD',audRate:1.60,timezone:'Australia/Sydney'},
  ui:{page:'live',dashMode:'live',dashRange:30},
  modes:{
    live:{label:'Live',startingBalance:1000,goalBalance:100000,payoutPct:92,stakeMode:'percent',stakeValue:.10,maxDailyTrades:30,dailyProfitTarget:50,dailyLossLimit:20,dailyGrowthTargetPct:1,assumedTradesPerDay:20},
    demo:{label:'Demo',startingBalance:1000,goalBalance:100000,payoutPct:92,stakeMode:'percent',stakeValue:.10,maxDailyTrades:30,dailyProfitTarget:50,dailyLossLimit:20,dailyGrowthTargetPct:1,assumedTradesPerDay:20}
  },
  trades:[],goals:[],version:2,createdAt:new Date().toISOString()
};
const $=sel=>document.querySelector(sel);
const $$=sel=>Array.from(document.querySelectorAll(sel));
const clone=obj=>JSON.parse(JSON.stringify(obj));
const round=n=>Math.round((Number(n)||0)*100)/100;
const clamp=(n,min,max)=>Math.min(max,Math.max(min,Number(n)||0));
const uid=()=> (crypto && crypto.randomUUID ? crypto.randomUUID() : 'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2));
const isTradeResult=r=>['win','loss','draw'].includes(r);
const esc=v=>String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
const DB={get(k,d=null){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v)}catch(e){return d}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};
let data=loadData();
let lastDeleted=null;

function deepMerge(base,extra){
  const out=clone(base); if(!extra||typeof extra!=='object')return out;
  for(const [k,v] of Object.entries(extra)){
    if(v && typeof v==='object' && !Array.isArray(v) && out[k] && typeof out[k]==='object' && !Array.isArray(out[k])) out[k]=deepMerge(out[k],v);
    else out[k]=v;
  }
  return out;
}
function loadData(){
  const current=DB.get(APP_KEY,null);
  if(current) return normalise(deepMerge(DEFAULTS,current));
  const legacyTrades=DB.get(LEGACY_KEYS.trades,null);
  const legacySettings=DB.get(LEGACY_KEYS.settings,null);
  const legacyGoals=DB.get(LEGACY_KEYS.goals,null);
  const migrated=clone(DEFAULTS);
  if(legacySettings){
    ['live','demo'].forEach(mode=>{
      const s=legacySettings[mode]||{};

iv>📭</div>No trades in this range.</div>'}</section>${insightCard(mode,st)}</div></div>`}
function equityChart(mode,rangeTrades){const sorted=[...trades(mode)].reverse().filter(t=>rangeTrades.includes(t));const vals=[modeCfg(mode).startingBalance,...sorted.map(t=>t.balanceAfter)];if(vals.length<2)return '<div class="empty"><div>📈</div>Log at least one trade to build the curve.</div>';const w=640,h=190,p=18,min=Math.min(...vals),max=Math.max(...vals),span=max-min||1;const pts=vals.map((v,i)=>[p+i*(w-2*p)/(vals.length-1),h-p-(v-min)*(h-2*p)/span]);const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');const area=path+` L ${pts[pts.length-1][0]} ${h-p} L ${pts[0][0]} ${h-p} Z`;return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#60a5fa" stop-opacity=".44"/><stop offset="1" stop-color="#60a5fa" stop-opacity="0"/></linearGradient></defs><line class="gridline" x1="${p}" y1="${p}" x2="${w-p}" y2="${p}"/><line class="gridline" x1="${p}" y1="${h/2}" x2="${w-p}" y2="${h/2}"/><line class="gridline" x1="${p}" y1="${h-p}" x2="${w-p}" y2="${h-p}"/><path class="area" d="${area}"/><path class="line" d="${path}"/><text x="${p}" y="${p+11}">${fmt(max)}</text><text x="${p}" y="${h-p-4}">${fmt(min)}</text></svg>`}
function barChart(rows){if(!rows.length)return '<div class="empty"><div>📅</div>No daily data yet.</div>';const w=640,h=190,p=22,max=Math.max(...rows.map(r=>Math.abs(r.pnl)),1);const bw=(w-2*p)/rows.length*.68,gap=(w-2*p)/rows.length*.32;const zero=h/2;return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><line class="gridline" x1="${p}" y1="${zero}" x2="${w-p}" y2="${zero}"/>${rows.map((r,i)=>{const x=p+i*(bw+gap)+gap/2;const bh=Math.abs(r.pnl)/max*(h/2-p);const y=r.pnl>=0?zero-bh:zero;return `<rect class="${r.pnl>=0?'barpos':'barneg'}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(2,bh).toFixed(1)}" rx="5"><title>${r.date}: ${fmt(r.pnl,{signed:true})}</title></rect>`}).join('')}<text x="${p}" y="${p}">${fmt(max,{signed:true})}</text><text x="${p}" y="${h-p}">-${fmt(max)}</text></svg>`}
function insightCard(mode,st){const g=guard(mode), toGoal=winsToGoal(mode);let msg='Keep logging consistently. Your roadmap gets more accurate as the sample size grows.';if(st.winRate>=60&&st.pnl>0)msg='Strong session profile. The priority is protecting discipline and avoiding over-trading after profit spikes.';else if(st.pnl<0)msg='Negative P/L detected. Focus on reducing trade frequency, waiting quality, and stopping at the loss limit.';return `<section class="card"><div class="card-title"><span>🧠 Session Review</span><span>${mode.toUpperCase()}</span></div><div class="alert ${g.score>=70?'good':g.score>=45?'warn':'bad'}"><span>🧭</span><div><strong>${esc(msg)}</strong><p>At the current stake/payout settings, the roadmap estimates ${toGoal.steps.toLocaleString()} clean winning trades to reach ${fmt(modeCfg(mode).goalBalance)}.</p></div></div></section>`}
function pageRoadmap(){const mode=data.ui.dashMode||'live', bal=currentBalance(mode), c=modeCfg(mode), toGoal=winsToGoal(mode);return `<div class="segment"><button class="${mode==='live'?'active':''}" data-action="dash-mode" data-mode="live">Live Roadmap</button><button class="${mode==='demo'?'active':''}" data-action="dash-mode" data-mode="demo">Demo Roadmap</button></div><section class="hero"><div class="hero-top"><div class="tag"><span class="dot ${mode==='demo'?'demo':''}"></span>Goal roadmap</div><button class="sync" data-action="open-goal">+ Goal</button></div><div class="balance">${fmt(bal)}</div><div class="subline"><span>Target ${fmt(c.goalBalance)}</span><span>•</span><span class="gold">${toGoal.steps.toLocaleString()} wins estimated</span><span>•</span><span>${toGoal.days.toLocaleString()} days at ${avgTradesPerDay(mode)}/day</span></div></section><div class="desktop-grid"><section class="card"><div class="card-title"><span>🏆 Milestone Ladder</span><span>${pct(clamp(bal/c.goalBalance*100,0,100))}</span></div>${milestones(mode).map((m,i)=>`<div class="roadmap-step ${m.done?'done':m.current?'current':''}"><div class="step-dot">${m.done?'✓':i+1}</div><div><b>${fmt(m.value)}</b><p class="hint">${m.done?'Reached':'Progress '+pct(m.progress)}</p><div class="progress mt"><div class="bar ${m.done?'green':m.current?'gold':''}" data-w="${m.progress}"></div></div></div><div class="mono ${m.done?'up':'soft'}">${pct(m.progress)}</div></div>`).join('')}</section><section class="card"><div class="card-title"><span>⭐ Personal Goals</span><span>${data.goals.length}</span></div>${goalList()}</section></div>`}
function goalList(){if(!data.goals.length)return '<div class="empty"><div>⭐</div>Add what you are trading towards: debt, equipment, property deposit, travel, or a reward.</div>';const bal=currentBalance('live');return data.goals.map(g=>{const p=g.amount?clamp(bal/g.amount*100,0,100):0;return `<div class="goal"><div class="goal-head"><div><h3>${esc(g.title)}</h3><small>${esc(g.category)} · ${esc(g.status)}</small></div><button class="mini" data-action="delete-goal" data-id="${g.id}">Delete</button></div><div class="row"><b class="mono">${fmt(g.amount)}</b><span class="mono soft">${pct(p)}</span></div><div class="progress mt"><div class="bar ${p>=100?'green':'gold'}" data-w="${p}"></div></div><p class="hint">${fmt(Math.max(0,g.amount-bal))} remaining from current Live balance.</p></div>`}).join('')}
function pageSettings(){const a=data.app;return `<section class="card"><div class="card-title"><span>⚙️ App Settings</span><span>offline local tracker</span></div><div class="field"><label>Tracker name</label><input id="set_name" value="${esc(a.name)}"></div><div class="two"><div class="field"><label>USD → AUD rate</label><input id="set_rate" type="number" step=".01" value="${esc(a.audRate)}"></div><div class="field"><label>Timezone</label><select id="set_tz">${['Australia/Sydney','Australia/Melbourne','Australia/Brisbane','Australia/Perth','Asia/Singapore','Asia/Tokyo','Europe/London','America/New_York','UTC'].map(t=>`<option ${t===a.timezone?'selected':''}>${t}</option>`).join('')}</select></div></div><button class="btn primary full" data-action="save-app-settings">Save App Settings</button></section>${modeSettings('live')}${modeSettings('demo')}<section class="card"><div class="card-title"><span>🗃️ Data Tools</span><span>backup first</span></div><div class="grid"><button class="btn goldbtn" data-action="export-json">Export JSON Backup</button><button class="btn ghost" data-action="export-csv">Export Trades CSV</button><label class="btn ghost" style="display:grid;place-items:center"><input type="file" accept="application/json" id="importFile" class="hide">Import JSON Backup</label><button class="btn danger" data-action="clear-trades">Clear All Trades</button><button class="btn danger" data-action="factory-reset">Factory Reset</button></div><p class="hint">All data is stored locally in this browser. Export a backup before clearing, updating, or moving devices.</p></section>`}
function modeSettings(mode){const c=modeCfg(mode);return `<section class="card"><div class="card-title"><span>${mode==='live'?'🟢 Live':'🧪 Demo'} Settings</span><span>${fmt(currentBalance(mode))}</span></div><div class="two"><div class="field"><label>Starting Balance</label><input id="${mode}_start" type="number" step=".01" value="${esc(c.startingBalance)}"></div><div class="field"><label>Goal Balance</label><input id="${mode}_goal" type="number" step=".01" value="${esc(c.goalBalance)}"></div></div><div class="two"><div class="field"><label>Payout %</label><input id="${mode}_payout" type="number" step=".1" value="${esc(c.payoutPct)}"></div><div class="field"><label>Assumed Trades/Day</label><input id="${mode}_assumed" type="number" step="1" value="${esc(c.assumedTradesPerDay)}"></div></div><div class="two"><div class="field"><label>Daily Profit Target</label><input id="${mode}_profit" type="number" step=".01" value="${esc(c.dailyProfitTarget)}"></div><div class="field"><label>Daily Loss Limit</label><input id="${mode}_loss" type="number" step=".01" value="${esc(c.dailyLossLimit)}"></div></div><div class="two"><div class="field"><label>Max Daily Trades</label><input id="${mode}_max" type="number" step="1" value="${esc(c.maxDailyTrades)}"></div><div class="field"><label>Daily Growth Target %</label><input id="${mode}_growth" type="number" step=".1" value="${esc(c.dailyGrowthTargetPct)}"></div></div><button class="btn primary full" data-action="save-mode-settings" data-mode="${mode}">Save ${mode} settings</button></section>`}
function openModal(html){$('#modal').innerHTML='<div class="handle"></div>'+html;$('#modalWrap').classList.add('show')}
function closeModal(){$('#modalWrap').classList.remove('show');$('#modal').innerHTML=''}
function openSync(mode){openModal(`<h2>Sync ${mode==='live'?'Live':'Demo'} Balance</h2><p class="hint mb">This creates a balance-sync entry so your audit trail stays intact.</p><div class="field"><label>Current balance</label><input value="${fmt(currentBalance(mode))}" disabled></div><div class="field"><label>Actual account balance</label><input id="sync_amount" class="big" type="number" step=".01" min="0" placeholder="1250.50"></div><div class="two"><button class="btn ghost" data-action="close-modal">Cancel</button><button class="btn goldbtn" data-action="do-sync" data-mode="${mode}">Sync</button></div>`);setTimeout(()=>$('#sync_amount')?.focus(),80)}
function openGoal(){openModal(`<h2>Add Financial Goal</h2><p class="hint mb">Keep it concrete: amount, category, and status.</p><div class="field"><label>Goal title</label><input id="goal_title" placeholder="e.g. Trading workstation"></div><div class="two"><div class="field"><label>Amount</label><input id="goal_amount" type="number" step=".01" placeholder="5000"></div><div class="field"><label>Category</label><select id="goal_cat"><option>goal</option><option>equipment</option><option>debt</option><option>property</option><option>reward</option><option>travel</option><option>other</option></select></div></div><div class="field"><label>Status</label><select id="goal_status"><option>saving</option><option>wishlist</option><option>ready</option><option>purchased</option></select></div><div class="two"><button class="btn ghost" data-action="close-modal">Cancel</button><button class="btn goldbtn" data-action="save-goal">Add Goal</button></div>`)}
function log(mode,result){const bal=currentBalance(mode);const profit=profitFor(mode,result,bal);const t={id:uid(),mode,result,stake:stakeFor(mode,bal),actualProfit:profit,balanceBefore:bal,balanceAfter:round(Math.max(0,bal+profit)),payoutPct:modeCfg(mode).payoutPct,timestamp:new Date().toISOString(),note:'',archived:false};data.trades.unshift(t);recalcAll(data);save();toast(`${result.toUpperCase()} logged · ${fmt(profit,{signed:true})}`,(result==='loss'?'err':result==='draw'?'info':'ok'),true);if(navigator.vibrate)navigator.vibrate(result==='loss'?[80,35,80]:[35]);render()}
function syncBalance(mode){const input=$('#sync_amount'), v=round(input?.value);if(!Number.isFinite(v)||v<0){toast('Enter a valid balance','err');return}const bal=currentBalance(mode);data.trades.unshift({id:uid(),mode,result:'sync',stake:0,actualProfit:round(v-bal),balanceBefore:bal,balanceAfter:v,payoutPct:0,timestamp:new Date().toISOString(),note:'Balance sync',archived:false});recalcAll(data);save();closeModal();toast(`Balance synced to ${fmt(v)}`,'ok',true);render()}
function deleteTrade(id){const idx=data.trades.findIndex(t=>t.id===id);if(idx<0)return;lastDeleted=data.trades[idx];data.trades.splice(idx,1);recalcAll(data);save();toast('Trade deleted','info',true);render()}
function undoLast(){if(!lastDeleted)return;data.trades.unshift(lastDeleted);lastDeleted=null;recalcAll(data);save();toast('Last deletion restored','ok');render()}
function saveModeSettings(mode){const c=modeCfg(mode);Object.assign(c,{startingBalance:round($(`#${mode}_start`).value)||c.startingBalance,goalBalance:round($(`#${mode}_goal`).value)||c.goalBalance,payoutPct:clamp($(`#${mode}_payout`).value,.1,500),assumedTradesPerDay:Math.max(1,parseInt($(`#${mode}_assumed`).value)||c.assumedTradesPerDay),dailyProfitTarget:round($(`#${mode}_profit`).value)||0,dailyLossLimit:round($(`#${mode}_loss`).value)||0,maxDailyTrades:Math.max(1,parseInt($(`#${mode}_max`).value)||c.maxDailyTrades),dailyGrowthTargetPct:clamp($(`#${mode}_growth`).value,0,100)});recalcAll(data);save();toast(`${mode} settings saved`,'ok');render()}
function saveAppSettings(){data.app.name=$('#set_name').value.trim()||'TradeCommand 360';data.app.audRate=round($('#set_rate').value)||1.6;data.app.timezone=$('#set_tz').value;save();toast('App settings saved','ok');render()}
function setStakeMode(mode,stakeMode){modeCfg(mode).stakeMode=stakeMode;modeCfg(mode).stakeValue=stakeMode==='percent'?.10:1;save();render()}
function setStakeValue(mode,v){const c=modeCfg(mode);c.stakeValue=c.stakeMode==='percent'?clamp(v,.01,100):Math.max(0,round(v));save();render()}
function exportJSON(){download('tradecommand360-backup-'+new Date().toISOString().slice(0,10)+'.json',JSON.stringify(data,null,2),'application/json');toast('JSON backup exported','ok')}
function exportCSV(){const head=['timestamp','mode','result','stake','actualProfit','balanceBefore','balanceAfter','payoutPct','note'];const rows=data.trades.slice().reverse().map(t=>head.map(h=>'"'+String(t[h]??'').replace(/"/g,'""')+'"').join(','));download('tradecommand360-trades-'+new Date().toISOString().slice(0,10)+'.csv',[head.join(','),...rows].join('\n'),'text/csv');toast('CSV exported','ok')}
function download(name,content,type){const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},200)}
function importJSON(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const imported=JSON.parse(reader.result);data=normalise(deepMerge(DEFAULTS,imported));save();toast('Backup imported','ok');render()}catch(e){toast('Import failed: invalid JSON','err')}};reader.readAsText(file)}
function saveGoal(){const title=$('#goal_title').value.trim();const amount=round($('#goal_amount').value);if(!title||amount<=0){toast('Enter a goal title and amount','err');return}data.goals.unshift({id:uid(),title,amount,category:$('#goal_cat').value,status:$('#goal_status').value,createdAt:new Date().toISOString()});save();closeModal();toast('Goal added','ok');render()}
function deleteGoal(id){data.goals=data.goals.filter(g=>g.id!==id);save();toast('Goal removed','info');render()}
function clearTrades(){if(!confirm('Clear every trade entry? Export a backup first if needed.'))return;data.trades=[];save();toast('All trades cleared','info');render()}
function factoryReset(){if(!confirm('Factory reset everything? This cannot be undone unless you exported a backup.'))return;localStorage.removeItem(APP_KEY);data=clone(DEFAULTS);save();toast('Factory reset complete','ok');render()}
function toast(msg,type='ok',withUndo=false){const wrap=$('#toastWrap');const el=document.createElement('div');el.className='toast '+type;el.innerHTML=`<span>${type==='err'?'⚠️':type==='info'?'ℹ️':'✅'}</span><span style="flex:1">${esc(msg)}</span>${withUndo&&lastDeleted?'<button class="mini" data-action="undo-delete">Undo</button>':''}`;wrap.appendChild(el);setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(-8px)';el.style.transition='.25s';setTimeout(()=>el.remove(),260)},3200)}
function handleClick(e){const btn=e.target.closest('[data-action],#nav button');if(!btn)return;const a=btn.dataset.action;if(btn.dataset.page){data.ui.page=btn.dataset.page;save();render();$('#page').scrollTop=0;return}if(a==='currency'){data.app.currency=btn.dataset.currency;save();render()}else if(a==='open-sync')openSync(btn.dataset.mode);else if(a==='modal-backdrop'&&e.target.id==='modalWrap')closeModal();else if(a==='close-modal')closeModal();else if(a==='do-sync')syncBalance(btn.dataset.mode);else if(a==='log')log(btn.dataset.mode,btn.dataset.result);else if(a==='delete-trade')deleteTrade(btn.dataset.id);else if(a==='undo-delete')undoLast();else if(a==='stake-mode')setStakeMode(btn.dataset.mode,btn.dataset.stakemode);else if(a==='dash-mode'){data.ui.dashMode=btn.dataset.mode;save();render()}else if(a==='dash-range'){data.ui.dashRange=btn.dataset.range==='all'?null:Number(btn.dataset.range);save();render()}else if(a==='open-goal')openGoal();else if(a==='save-goal')saveGoal();else if(a==='delete-goal')deleteGoal(btn.dataset.id);else if(a==='save-mode-settings')saveModeSettings(btn.dataset.mode);else if(a==='save-app-settings')saveAppSettings();else if(a==='export-json')exportJSON();else if(a==='export-csv')exportCSV();else if(a==='clear-trades')clearTrades();else if(a==='factory-reset')factoryReset()}
function handleInput(e){const el=e.target;if(el.dataset.action==='stake-input')setStakeValue(el.dataset.mode,el.value);if(el.id==='importFile')importJSON(el.files[0])}
document.addEventListener('click',handleClick);document.addEventListener('change',handleInput);
if('serviceWorker' in navigator && location.protocol.startsWith('http')) navigator.serviceWorker.register('./sw.js').catch(()=>{});
render();
})();
</script>
</body>
</html>
